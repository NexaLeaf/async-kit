# ─────────────────────────────────────────────────────────────────────────────
# Release workflow — fully automatic npm publish on every push to main
#
# Flow
#   push to main  ──►  validate (audit+test+build)  ──►  publish (auto)
#
# The `npm-publish` GitHub Environment is the ONLY gate.
# If you add required reviewers there, you get a one-click approval in the
# Actions UI before the publish step runs. Remove reviewers for fully hands-off.
#
# Manual trigger is also available for dry-runs, single-package releases,
# or first-ever publish.
#
# Required secrets  (Settings → Secrets and variables → Actions)
#   NPM_TOKEN      — npmjs.com → Avatar → Access Tokens → Automation type
#   RELEASE_TOKEN  — GitHub PAT (classic) with scopes: repo, workflow
#                    needed to push the version-bump commit to protected main
#
# Required GitHub Environment  (Settings → Environments → npm-publish)
#   • Add required reviewers for a one-click approval gate (optional)
#   • Leave empty for fully automatic zero-click publishing
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  # ── Automatic: every push to main triggers a publish attempt ───────────────
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

  # ── Manual: dry-runs, scoped releases, first publish ───────────────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — preview version bumps without publishing'
        type: boolean
        default: false
      package:
        description: 'Scope to one package, e.g. @async-kit/limitx (empty = all changed)'
        type: string
        required: false
      first_release:
        description: 'First-ever publish — pass --first-release to nx'
        type: boolean
        default: false

permissions:
  contents: write       # push version-bump commit + git tags
  id-token: write       # OIDC token for npm provenance
  pull-requests: write  # create GitHub Releases

# Never cancel a publish mid-flight; queue the next one instead
concurrency:
  group: release
  cancel-in-progress: false

# ─── Shared project filter expression ─────────────────────────────────────────
env:
  NX_PROJECTS: ${{ inputs.package && format('--projects={0}', inputs.package) || '' }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. Validate — audit + typecheck + test + build
  #    Runs on every push to main and every manual dispatch.
  #    Uploads dist/ so the publish job reuses the same build artifacts.
  # ═══════════════════════════════════════════════════════════════════════════
  validate:
    name: Validate (audit · test · build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type-check all packages
        run: npx nx run-many -t typecheck --all --parallel=4

      - name: Test all packages
        run: npx nx run-many -t test --all --parallel=4

      - name: Build all packages
        run: npx nx run-many -t build --all --parallel=4

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: packages/*/dist
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # 2a. Dry Run — only when dry_run input is true (manual dispatch only)
  #     No environment gate — safe to run without approval.
  # ═══════════════════════════════════════════════════════════════════════════
  dry-run:
    name: Dry Run (preview)
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      needs.validate.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.dry_run == true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Restore dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: packages

      - name: Configure git identity
        run: |
          git config user.email "release-bot@async-kit.dev"
          git config user.name "async-kit release bot"

      - name: nx release — dry run
        run: |
          npx nx release --dry-run \
            ${{ inputs.first_release && '--first-release' || '' }} \
            ${{ env.NX_PROJECTS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 2b. Publish — automatic on every push to main that passes validate.
  #     Also runs on manual dispatch when dry_run is false.
  #
  #     GATE: the `npm-publish` GitHub Environment.
  #       • With required reviewers → one-click approval in Actions UI
  #       • Without reviewers       → fully automatic, zero clicks needed
  # ═══════════════════════════════════════════════════════════════════════════
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment: npm-publish
    if: >-
      needs.validate.result == 'success' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.dry_run != true))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Restore dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: packages

      - name: Configure git identity
        run: |
          git config user.email "release-bot@async-kit.dev"
          git config user.name "async-kit release bot"

      # ── Step 1: Bump versions, write CHANGELOG, create git tag ──────────────
      - name: Version bump + changelog
        run: |
          npx nx release \
            --skip-publish \
            ${{ inputs.first_release && '--first-release' || '' }} \
            ${{ env.NX_PROJECTS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Publish packages to npm with OIDC provenance ────────────────
      - name: Publish to npm
        run: npx nx release publish ${{ env.NX_PROJECTS }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # ── Step 3: Push version-bump commit + tags to main ─────────────────────
      - name: Push release commit and tags
        run: git push --follow-tags origin HEAD:main

      # ── Summary printed in the Actions run page ──────────────────────────────
      - name: Write job summary
        run: |
          echo "## Published packages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for pkg in packages/*/package.json; do
            name=$(node -p "require('./$pkg').name")
            ver=$(node -p "require('./$pkg').version")
            echo "- \`${name}@${ver}\` → https://www.npmjs.com/package/${name}" \
              >> "$GITHUB_STEP_SUMMARY"
          done
